name: Build K2P A1 OpenWrt PassWall2

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 5'

env:
  TZ: Asia/Shanghai
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Prepare environment
      run: |
        sudo -E apt-get update
        sudo -E apt-get install -y \
          build-essential \
          clang \
          flex \
          bison \
          g++ \
          gawk \
          gcc-multilib \
          gettext \
          git \
          libncurses5-dev \
          libssl-dev \
          python3-distutils \
          rsync \
          unzip \
          zlib1g-dev \
          file

    - name: Clone ImmortalWrt
      run: |
        git clone --depth=1 \
        https://github.com/immortalwrt/immortalwrt.git \
        openwrt

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
    - name: Run DIY scripts
      run: |
        chmod +x diy-part1.sh diy-part2.sh
        ./diy-part1.sh
        ./diy-part2.sh

    - name: Load K2P configuration
      run: |
        cp .config openwrt/.config

    - name: Compile
      run: |
        cd openwrt
        make defconfig
        make download -j8
        make -j$(nproc) V=s

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: K2P-A1-PassWall2-Firmware
        path: openwrt/bin/targets/ramips/mt7621/*
